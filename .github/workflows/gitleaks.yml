name: Gitleaks

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]

permissions:
  contents: read
  pull-requests: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # Use the gitleaks binary directly. The gitleaks-action GitHub Action
      # requires a paid license for organization accounts as of 2024; the
      # CLI binary is free, self-hosted-friendly, and identical functionality.
      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION=8.30.1
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            -o /tmp/gitleaks.tar.gz
          tar -xz -C /tmp -f /tmp/gitleaks.tar.gz
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Scan repository
        run: |
          gitleaks detect \
            --source . \
            --log-opts="--all" \
            --config .gitleaks.toml \
            --report-format json \
            --report-path gitleaks-report.json \
            --verbose
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json
