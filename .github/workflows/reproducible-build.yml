name: Reproducible Build

on:
  push:
    tags: ['v*']
  pull_request:
    paths:
      - 'internal/**'
      - 'src/**'
      - 'dashboard/src-tauri/**'
      - 'Makefile'
      - '.github/workflows/reproducible-build.yml'

permissions:
  contents: read

jobs:
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: Build Go shared library (reproducible)
        env:
          SOURCE_DATE_EPOCH: ${{ github.event.head_commit.timestamp || '0' }}
        run: make build-reproducible
      - name: Compute hashes
        run: |
          shasum -a 256 dashboard/src-tauri/libarcsign*.dylib > sha256-macos.txt
          cat sha256-macos.txt
      - uses: actions/upload-artifact@v4
        with:
          name: sha256-macos
          path: sha256-macos.txt

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: Build Go shared library
        env:
          SOURCE_DATE_EPOCH: ${{ github.event.head_commit.timestamp || '0' }}
        run: make build-lib-linux
      - name: Compute hashes
        run: |
          sha256sum dashboard/src-tauri/libarcsign*.so > sha256-linux.txt || true
          find . -name 'libarcsign*.so' -exec sha256sum {} \; >> sha256-linux.txt
          cat sha256-linux.txt
      - uses: actions/upload-artifact@v4
        with:
          name: sha256-linux
          path: sha256-linux.txt

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: Build Go shared library
        shell: bash
        run: make build-lib-windows || true
      - name: Compute hashes
        shell: bash
        run: |
          find . -name 'libarcsign*.dll' -exec sha256sum {} \; > sha256-windows.txt || true
          cat sha256-windows.txt
      - uses: actions/upload-artifact@v4
        with:
          name: sha256-windows
          path: sha256-windows.txt

  publish-hashes:
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
      - name: Combine SHA256SUMS
        run: |
          cat sha256-macos/sha256-macos.txt \
              sha256-linux/sha256-linux.txt \
              sha256-windows/sha256-windows.txt > SHA256SUMS 2>/dev/null || true
          cat SHA256SUMS
      - uses: actions/upload-artifact@v4
        with:
          name: SHA256SUMS
          path: SHA256SUMS
