name: Build Verify

on:
  pull_request:
    branches: [master]

concurrency:
  group: build-verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go-lib-linux:
    name: Go Lib (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: stable

      - name: Build Linux shared library
        run: CGO_ENABLED=1 GOOS=linux GOARCH=amd64 go build -buildmode=c-shared -o libarcsign.so ./internal/lib

      - name: Verify build output
        run: file libarcsign.so

  go-lib-macos:
    name: Go Lib (macOS Universal)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: stable

      - name: Build arm64
        run: CGO_ENABLED=1 GOOS=darwin GOARCH=arm64 go build -buildmode=c-shared -o libarcsign_arm64.dylib ./internal/lib

      - name: Build amd64
        run: CGO_ENABLED=1 GOOS=darwin GOARCH=amd64 go build -buildmode=c-shared -o libarcsign_amd64.dylib ./internal/lib

      - name: Create universal binary
        run: lipo -create -output libarcsign.dylib libarcsign_arm64.dylib libarcsign_amd64.dylib

      - name: Fix install name
        run: install_name_tool -id @rpath/libarcsign.dylib libarcsign.dylib

      - name: Verify universal binary
        run: lipo -info libarcsign.dylib

  go-lib-windows:
    name: Go Lib (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: stable

      - name: Setup MinGW
        run: echo "C:\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build Windows DLL
        run: go build -buildmode=c-shared -o libarcsign.dll ./internal/lib
        env:
          CGO_ENABLED: "1"
          CC: gcc

      - name: Verify build output
        run: if (Test-Path libarcsign.dll) { Write-Host "DLL built successfully"; Get-Item libarcsign.dll } else { exit 1 }

  dashboard-build:
    name: Dashboard Build
    runs-on: ubuntu-latest
    env:
      VITE_WALLETCONNECT_PROJECT_ID: ci-placeholder
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        working-directory: dashboard
        run: npm ci

      - name: TypeScript check
        working-directory: dashboard
        run: npx tsc --noEmit

      - name: Vite build
        working-directory: dashboard
        run: npx vite build

  contracts-compile:
    name: Contracts Compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: contracts/package-lock.json

      - name: Install hardhat-plugin dependencies
        working-directory: packages/hardhat-plugin
        run: npm ci

      - name: Install contract dependencies
        working-directory: contracts
        run: npm ci

      - name: Compile contracts
        working-directory: contracts
        run: npx hardhat compile

  tauri-check:
    name: Tauri Rust Check
    runs-on: ubuntu-22.04
    env:
      VITE_WALLETCONNECT_PROJECT_ID: ci-placeholder
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - uses: swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2
        with:
          workspaces: dashboard/src-tauri

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          # Tauri v2 requires webkit2gtk-4.1 and libsoup-3.0 (not the v4.0/2.4 used by Tauri v1)
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dashboard dependencies
        working-directory: dashboard
        run: npm ci

      - name: Build frontend
        working-directory: dashboard
        run: npm run build

      - name: Cargo check
        working-directory: dashboard/src-tauri
        run: cargo check
