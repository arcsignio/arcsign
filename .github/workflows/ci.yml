name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go-tests:
    name: Go Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-mod-${{ hashFiles('go.sum', 'src/chainadapter/go.sum') }}
          restore-keys: go-mod-

      - name: Run internal tests
        run: CGO_ENABLED=1 go test ./internal/... -v -count=1

      - name: Run chainadapter tests
        working-directory: src/chainadapter
        run: CGO_ENABLED=1 go test ./... -v -count=1

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        working-directory: dashboard
        run: npm ci

      - name: Run tests
        working-directory: dashboard
        run: npx vitest --run

      - name: Run coverage
        if: github.event_name == 'pull_request'
        working-directory: dashboard
        run: npx vitest --run --coverage

  contract-tests:
    name: Contract Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: contracts/package-lock.json

      - name: Install hardhat-plugin dependencies
        working-directory: packages/hardhat-plugin
        run: npm ci

      - name: Install contract dependencies
        working-directory: contracts
        run: npm ci

      - name: Cache Hardhat
        uses: actions/cache@v4
        with:
          path: |
            contracts/cache
            contracts/artifacts
          key: hardhat-${{ hashFiles('contracts/contracts/**/*.sol') }}
          restore-keys: hardhat-

      - name: Run contract tests
        working-directory: contracts
        run: npx hardhat test

  lint-go:
    name: Go Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

      - name: Vet chainadapter
        working-directory: src/chainadapter
        run: go vet ./...
