name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go-tests:
    name: Go Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: stable

      - name: Cache Go modules
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-mod-${{ hashFiles('go.sum', 'src/chainadapter/go.sum') }}
          restore-keys: go-mod-

      - name: Run internal tests
        run: CGO_ENABLED=1 go test ./internal/... -v -count=1

      - name: Run chainadapter tests
        working-directory: src/chainadapter
        run: CGO_ENABLED=1 go test $(go list ./... | grep -v /examples) -v -count=1

      - name: Govulncheck (report-only, non-blocking)
        continue-on-error: true
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          $(go env GOPATH)/bin/govulncheck ./...
          (cd src/chainadapter && $(go env GOPATH)/bin/govulncheck ./...)

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        working-directory: dashboard
        run: npm ci

      - name: Run tests
        working-directory: dashboard
        run: npx vitest --run

      - name: Run coverage
        if: github.event_name == 'pull_request'
        working-directory: dashboard
        run: npx vitest --run --coverage

  contract-tests:
    name: Contract Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: contracts/package-lock.json

      - name: Install hardhat-plugin dependencies
        working-directory: packages/hardhat-plugin
        run: npm ci

      - name: Install contract dependencies
        working-directory: contracts
        run: npm ci

      - name: Cache Hardhat
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            contracts/cache
            contracts/artifacts
          key: hardhat-${{ hashFiles('contracts/contracts/**/*.sol') }}
          restore-keys: hardhat-

      - name: Run contract tests
        working-directory: contracts
        run: npx hardhat test

  lint-go:
    name: Go Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: stable

      - name: golangci-lint
        uses: golangci/golangci-lint-action@55c2c1448f86e01eaae002a5a3a9624417608d84 # v6.5.2
        with:
          version: v1.64.8
          install-mode: goinstall
          args: --timeout=5m

      - name: Vet chainadapter
        working-directory: src/chainadapter
        run: go vet $(go list ./... | grep -v /examples)
