name: Close Stale Issues

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          days-before-issue-stale: 30
          days-before-issue-close: 14
          stale-issue-message: |
            This issue has been automatically marked as stale because it has
            had no activity for 30 days. It will be closed in 14 days if no
            further activity occurs.

            If this issue is still relevant, please leave a comment.
          close-issue-message: |
            Closing due to inactivity. Please feel free to reopen if needed.
          stale-issue-label: 'stale'
          exempt-issue-labels: 'pinned,security,needs-design'
          days-before-pr-stale: 60
          days-before-pr-close: 30
          stale-pr-message: |
            This PR has had no activity for 60 days. It will be closed in
            30 days. Please rebase, address review comments, or comment to
            keep it open.
          stale-pr-label: 'stale'
          exempt-pr-labels: 'pinned,wip'
