name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  version-check:
    name: Version Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Verify version consistency
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "Tag version: $TAG_VERSION"

          PKG_VERSION=$(node -p "require('./dashboard/package.json').version")
          TAURI_VERSION=$(node -p "require('./dashboard/src-tauri/tauri.conf.json').version")
          CARGO_VERSION=$(grep '^version' dashboard/src-tauri/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')

          echo "package.json:    $PKG_VERSION"
          echo "tauri.conf.json: $TAURI_VERSION"
          echo "Cargo.toml:      $CARGO_VERSION"

          MISMATCH=0
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match tag ($TAG_VERSION)"
            MISMATCH=1
          fi
          if [ "$TAG_VERSION" != "$TAURI_VERSION" ]; then
            echo "::error::tauri.conf.json version ($TAURI_VERSION) does not match tag ($TAG_VERSION)"
            MISMATCH=1
          fi
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::Cargo.toml version ($CARGO_VERSION) does not match tag ($TAG_VERSION)"
            MISMATCH=1
          fi

          if [ "$MISMATCH" -eq 1 ]; then
            echo ""
            echo "Fix: run 'node scripts/version.js $TAG_VERSION' to sync versions"
            exit 1
          fi

          echo "All versions match: $TAG_VERSION"

  build-go-libs:
    name: Build Go Libs (${{ matrix.target }} / ${{ matrix.variant }})
    needs: version-check
    strategy:
      fail-fast: false
      matrix:
        # variant: prod = 正式版（不帶 dev tag）；dev = 開發者版（DEV=1 → exports_dev.go）
        variant: [prod, dev]
        include:
          - os: ubuntu-latest
            target: linux
            output: libarcsign.so
          - os: macos-latest
            target: macos
            output: libarcsign.dylib
          - os: windows-latest
            target: windows
            output: libarcsign.dll
        exclude:
          # 開發者版只出 macOS + Linux；Windows dev 使用者罕見，跳過省 CI
          - { variant: dev, target: windows }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: stable

      # All platforms now go through `make build-reproducible`, which:
      # - sets SOURCE_DATE_EPOCH from the commit timestamp
      # - applies GOFLAGS="-trimpath"
      # - delegates to build-lib-{macos,linux,windows} for platform-specific
      #   handling (lipo universal binary on macOS, etc.)
      # This is the EXACT same target a user runs locally per
      # docs/reproducible-builds.md, so the published dylib hash matches
      # what an independent verifier computes.

      - name: Setup MinGW (Windows only)
        if: matrix.target == 'windows'
        run: echo "C:\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build reproducibly
        shell: bash
        env:
          CGO_ENABLED: "1"
          CC: ${{ matrix.target == 'windows' && 'gcc' || '' }}
        # 正式版：make build-reproducible（無 DEV）。開發者版：DEV=1 → -tags dev
        # 透過命令列變數傳入，會經由 MAKEFLAGS 自動傳遞給 build-reproducible 內
        # 遞迴呼叫的 build-lib-{macos,linux}，使 exports_dev.go 編入。
        run: make build-reproducible${{ matrix.variant == 'dev' && ' DEV=1' || '' }}

      - name: Copy artifact to repo root for upload
        shell: bash
        run: |
          case "${{ matrix.target }}" in
            macos)   cp dashboard/src-tauri/libarcsign.dylib libarcsign.dylib ;;
            linux)   cp dashboard/src-tauri/libarcsign.so libarcsign.so ;;
            windows) cp dashboard/src-tauri/libarcsign.dll libarcsign.dll ;;
          esac

      - name: Upload Go library
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: go-lib-${{ matrix.target }}${{ matrix.variant == 'dev' && '-dev' || '' }}
          path: ${{ matrix.output }}
          retention-days: 1

  build-tauri-apps:
    name: Build App (${{ matrix.target }} / ${{ matrix.variant }})
    needs: build-go-libs
    strategy:
      fail-fast: false
      matrix:
        # variant: prod = 正式版（無 dev-mode feature）；dev = 開發者版（--features dev-mode）
        variant: [prod, dev]
        include:
          - os: macos-latest
            target: macos
            lib_name: libarcsign.dylib
            lib_artifact: go-lib-macos
          - os: ubuntu-22.04
            target: linux
            lib_name: libarcsign.so
            lib_artifact: go-lib-linux
          - os: windows-latest
            target: windows
            lib_name: libarcsign.dll
            lib_artifact: go-lib-windows
        exclude:
          # 開發者版只出 macOS + Linux
          - { variant: dev, target: windows }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7
        with:
          toolchain: "1.93.1"

      - uses: swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2
        with:
          workspaces: dashboard/src-tauri

      # Download Go shared library into Tauri source directory
      - name: Download Go library
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          # dev 版抓帶 DEV=1（含 exports_dev.go）的 lib，與 dev-mode feature 配對
          name: ${{ matrix.lib_artifact }}${{ matrix.variant == 'dev' && '-dev' || '' }}
          path: dashboard/src-tauri

      - name: Verify Go library (Unix)
        if: matrix.target != 'windows'
        run: ls -la dashboard/src-tauri/${{ matrix.lib_name }}

      - name: Verify Go library (Windows)
        if: matrix.target == 'windows'
        run: Get-Item dashboard/src-tauri/${{ matrix.lib_name }}

      # Linux-specific dependencies
      - name: Install Linux dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          # Tauri v2 requires webkit2gtk-4.1 and libsoup-3.0 (not the v4.0/2.4 used by Tauri v1)
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install dashboard dependencies
        working-directory: dashboard
        run: npm ci

      - name: Build with Tauri
        uses: tauri-apps/tauri-action@73fb865345c54760d875b94642314f8c0c894afa # v0.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_WALLETCONNECT_PROJECT_ID: ${{ secrets.VITE_WALLETCONNECT_PROJECT_ID }}
          # Tauri updater signing (all platforms)
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
          # macOS code signing + notarization (disabled until Apple Developer account is configured)
        with:
          projectPath: dashboard
          # 開發者版傳 --features dev-mode 給 `tauri build`，啟用 WebSocket dev handlers。
          # 正式版傳空字串，行為與原本完全相同（process-identical）。
          args: ${{ matrix.variant == 'dev' && '--features dev-mode' || '' }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: tauri-app-${{ matrix.target }}${{ matrix.variant == 'dev' && '-dev' || '' }}
          path: |
            dashboard/src-tauri/target/release/bundle/**/*.dmg
            dashboard/src-tauri/target/release/bundle/**/*.app.tar.gz
            dashboard/src-tauri/target/release/bundle/**/*.app.tar.gz.sig
            dashboard/src-tauri/target/release/bundle/**/*.msi
            dashboard/src-tauri/target/release/bundle/**/*.msi.zip
            dashboard/src-tauri/target/release/bundle/**/*.msi.zip.sig
            dashboard/src-tauri/target/release/bundle/**/*.exe
            dashboard/src-tauri/target/release/bundle/**/*.nsis.zip
            dashboard/src-tauri/target/release/bundle/**/*.nsis.zip.sig
            dashboard/src-tauri/target/release/bundle/**/*.deb
            dashboard/src-tauri/target/release/bundle/**/*.AppImage
            dashboard/src-tauri/target/release/bundle/**/*.AppImage.tar.gz
            dashboard/src-tauri/target/release/bundle/**/*.AppImage.tar.gz.sig
          retention-days: 5

  create-release:
    name: Create Release
    needs: build-tauri-apps
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Download Tauri app artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: artifacts
          pattern: tauri-app-*
          merge-multiple: false

      - name: Download Go library artifacts (for reproducibility verification)
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: artifacts
          pattern: go-lib-*
          # merge-multiple:false 讓 prod 與 dev 的 libarcsign.* 各自留在
          # go-lib-<target>/ vs go-lib-<target>-dev/ 子目錄，不互相覆蓋。
          merge-multiple: false

      - name: List artifacts
        run: find artifacts -type f | head -50

      - name: Rename artifacts to standard naming
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p release-assets

          # 正式版 (prod) 與開發者版 (dev) 的 bundle 檔名相同（productName 都是
          # ArcSign），靠 artifact 子目錄區分：prod 在 <artifact>/、dev 在
          # <artifact>-dev/。下面 prod 的 find 用 `-path '*-dev/*' -prune -o ... -print`
          # 排除 dev 子目錄，dev 區塊則用 `-path '*-dev/*'` 只挑 dev。

          # === PRODUCTION installer artifacts (for direct download) ===
          # Stable filenames (no version) — landing page uses
          # github.com/.../releases/latest/download/<asset> which requires
          # consistent asset names across releases.

          # macOS DMG
          DMG=$(find artifacts -path "*-dev/*" -prune -o -name "*.dmg" -print | head -1)
          if [ -n "$DMG" ]; then
            cp "$DMG" "release-assets/ArcSign-macOS-ARM64.dmg"
          fi

          # Windows MSI
          MSI=$(find artifacts -path "*-dev/*" -prune -o \( -name "*.msi" ! -name "*.msi.zip" \) -print | head -1)
          if [ -n "$MSI" ]; then
            cp "$MSI" "release-assets/ArcSign-Windows-x64.msi"
          fi

          # Windows EXE (NSIS installer)
          EXE=$(find artifacts -path "*-dev/*" -prune -o \( -name "*-setup.exe" -o -name "*_x64-setup.exe" \) -print | head -1)
          if [ -n "$EXE" ]; then
            cp "$EXE" "release-assets/ArcSign-Windows-x64-Setup.exe"
          fi

          # Linux DEB
          DEB=$(find artifacts -path "*-dev/*" -prune -o -name "*.deb" -print | head -1)
          if [ -n "$DEB" ]; then
            cp "$DEB" "release-assets/ArcSign-Linux-x64.deb"
          fi

          # Linux AppImage
          APPIMAGE=$(find artifacts -path "*-dev/*" -prune -o \( -name "*.AppImage" ! -name "*.AppImage.tar.gz" ! -name "*.AppImage.tar.gz.sig" \) -print | head -1)
          if [ -n "$APPIMAGE" ]; then
            cp "$APPIMAGE" "release-assets/ArcSign-Linux-x64.AppImage"
          fi

          # === Reproducibility artifacts (Go shared library) ===
          # Allows users to verify the dylib/so/dll inside the bundle
          # matches the bit-for-bit reproducible build from source.

          GO_DYLIB=$(find artifacts -path "*-dev/*" -prune -o -name "libarcsign.dylib" -print | head -1)
          GO_SO=$(find artifacts -path "*-dev/*" -prune -o -name "libarcsign.so" -print | head -1)
          GO_DLL=$(find artifacts -path "*-dev/*" -prune -o -name "libarcsign.dll" -print | head -1)
          [ -n "$GO_DYLIB" ] && cp "$GO_DYLIB" "release-assets/libarcsign.dylib"
          [ -n "$GO_SO" ] && cp "$GO_SO" "release-assets/libarcsign.so"
          [ -n "$GO_DLL" ] && cp "$GO_DLL" "release-assets/libarcsign.dll"

          # === Updater artifacts (for OTA auto-update) ===
          # OTA 只走正式版；開發者版不掛 latest.json，故只取 prod 子目錄。

          # macOS updater bundle (.app.tar.gz + .sig)
          MAC_TAR=$(find artifacts -path "*-dev/*" -prune -o \( -name "*.app.tar.gz" ! -name "*.sig" \) -print | head -1)
          MAC_SIG=$(find artifacts -path "*-dev/*" -prune -o -name "*.app.tar.gz.sig" -print | head -1)
          if [ -n "$MAC_TAR" ]; then
            cp "$MAC_TAR" "release-assets/ArcSign.app.tar.gz"
          fi
          if [ -n "$MAC_SIG" ]; then
            cp "$MAC_SIG" "release-assets/ArcSign.app.tar.gz.sig"
          fi

          # Windows NSIS updater bundle (.nsis.zip + .sig)
          WIN_NSIS_ZIP=$(find artifacts -path "*-dev/*" -prune -o \( -name "*.nsis.zip" ! -name "*.sig" \) -print | head -1)
          WIN_NSIS_SIG=$(find artifacts -path "*-dev/*" -prune -o -name "*.nsis.zip.sig" -print | head -1)
          if [ -n "$WIN_NSIS_ZIP" ]; then
            cp "$WIN_NSIS_ZIP" "release-assets/ArcSign-Windows-x64-Setup.nsis.zip"
          fi
          if [ -n "$WIN_NSIS_SIG" ]; then
            cp "$WIN_NSIS_SIG" "release-assets/ArcSign-Windows-x64-Setup.nsis.zip.sig"
          fi

          # Linux updater bundle (.AppImage.tar.gz + .sig)
          LINUX_TAR=$(find artifacts -path "*-dev/*" -prune -o \( -name "*.AppImage.tar.gz" ! -name "*.sig" \) -print | head -1)
          LINUX_SIG=$(find artifacts -path "*-dev/*" -prune -o -name "*.AppImage.tar.gz.sig" -print | head -1)
          if [ -n "$LINUX_TAR" ]; then
            cp "$LINUX_TAR" "release-assets/ArcSign-Linux-x64.AppImage.tar.gz"
          fi
          if [ -n "$LINUX_SIG" ]; then
            cp "$LINUX_SIG" "release-assets/ArcSign-Linux-x64.AppImage.tar.gz.sig"
          fi

          # === DEVELOPER (dev) installer artifacts — macOS + Linux only ===
          # Hardhat/testnet 自動簽版本；檔名插入 `-dev` 後綴，與正式版不撞名。
          # 不進 OTA（無 latest.json 引用），但會被 SHA256SUMS 涵蓋。

          # macOS DMG (dev)
          DMG_DEV=$(find artifacts -path "*-dev/*" -name "*.dmg" -print | head -1)
          if [ -n "$DMG_DEV" ]; then
            cp "$DMG_DEV" "release-assets/ArcSign-dev-macOS-ARM64.dmg"
          fi

          # Linux DEB (dev)
          DEB_DEV=$(find artifacts -path "*-dev/*" -name "*.deb" -print | head -1)
          if [ -n "$DEB_DEV" ]; then
            cp "$DEB_DEV" "release-assets/ArcSign-dev-Linux-x64.deb"
          fi

          # Linux AppImage (dev)
          APPIMAGE_DEV=$(find artifacts -path "*-dev/*" \( -name "*.AppImage" ! -name "*.AppImage.tar.gz" ! -name "*.AppImage.tar.gz.sig" \) -print | head -1)
          if [ -n "$APPIMAGE_DEV" ]; then
            cp "$APPIMAGE_DEV" "release-assets/ArcSign-dev-Linux-x64.AppImage"
          fi

          # Dev Go shared libraries (DEV=1 build, for reproducibility verification)
          GO_DYLIB_DEV=$(find artifacts -path "*-dev/*" -name "libarcsign.dylib" -print | head -1)
          GO_SO_DEV=$(find artifacts -path "*-dev/*" -name "libarcsign.so" -print | head -1)
          [ -n "$GO_DYLIB_DEV" ] && cp "$GO_DYLIB_DEV" "release-assets/libarcsign-dev.dylib"
          [ -n "$GO_SO_DEV" ] && cp "$GO_SO_DEV" "release-assets/libarcsign-dev.so"

          echo "=== Release Assets ==="
          ls -la release-assets/

      - name: Generate checksums
        run: |
          cd release-assets
          # Hash everything: prod + dev bundles + reproducibility libs + updater
          # artifacts. `ArcSign-*` covers both prod and dev bundles (the `-dev-`
          # infix is matched by the `*`). The Go libs need BOTH globs, though:
          # `libarcsign.*` matches the prod libs (libarcsign.dylib/.so/.dll) but
          # NOT the dev libs (libarcsign-dev.dylib/.so), because the glob requires
          # a literal `.` right after `libarcsign`. So `libarcsign-dev.*` is listed
          # explicitly to cover the dev Go libs.
          # `2>/dev/null` swallows the "No such file" from any glob that matches
          # nothing on a prod-only run (e.g. libarcsign-dev.*); `|| true` keeps the
          # non-zero exit from that unmatched arg from aborting the step under
          # GitHub Actions' default `bash -eo pipefail`. SHA256SUMS is still written
          # for the files that DO exist.
          sha256sum ArcSign-* libarcsign.* libarcsign-dev.* 2>/dev/null > SHA256SUMS || true
          echo "=== SHA256SUMS ==="
          cat SHA256SUMS

      - name: Generate updater manifest (latest.json)
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          REPO="arcsignio/arcsign"
          BASE_URL="https://github.com/${REPO}/releases/download/${GITHUB_REF_NAME}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Read signatures from .sig files (empty string if not found)
          MAC_SIG=""
          if [ -f "release-assets/ArcSign.app.tar.gz.sig" ]; then
            MAC_SIG=$(cat "release-assets/ArcSign.app.tar.gz.sig")
          fi

          WIN_SIG=""
          WIN_SIG_FILE=$(find release-assets -name "*.nsis.zip.sig" | head -1)
          if [ -n "$WIN_SIG_FILE" ]; then
            WIN_SIG=$(cat "$WIN_SIG_FILE")
          fi

          LINUX_SIG=""
          LINUX_SIG_FILE=$(find release-assets -name "*.AppImage.tar.gz.sig" | head -1)
          if [ -n "$LINUX_SIG_FILE" ]; then
            LINUX_SIG=$(cat "$LINUX_SIG_FILE")
          fi

          # Build latest.json — Tauri v1 updater manifest
          # URLs point to GitHub Release attachments (no R2 dependency).
          cat > release-assets/latest.json << MANIFEST_EOF
          {
            "version": "${VERSION}",
            "notes": "ArcSign v${VERSION} is available. See release notes at https://github.com/${REPO}/releases/tag/${GITHUB_REF_NAME}",
            "pub_date": "${DATE}",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${MAC_SIG}",
                "url": "${BASE_URL}/ArcSign.app.tar.gz"
              },
              "darwin-x86_64": {
                "signature": "${MAC_SIG}",
                "url": "${BASE_URL}/ArcSign.app.tar.gz"
              },
              "linux-x86_64": {
                "signature": "${LINUX_SIG}",
                "url": "${BASE_URL}/ArcSign-Linux-x64.AppImage.tar.gz"
              },
              "windows-x86_64": {
                "signature": "${WIN_SIG}",
                "url": "${BASE_URL}/ArcSign-Windows-x64-Setup.nsis.zip"
              }
            }
          }
          MANIFEST_EOF

          echo "=== latest.json ==="
          cat release-assets/latest.json

      - name: Build release notes (CHANGELOG section + downloads template)
        run: |
          TAG="${{ github.ref_name }}"
          NOTES_FILE="release-notes.md"

          # Extract this tag's section from CHANGELOG.md (between "## [v1.5.1]"
          # and the next "## [" heading). Falls back gracefully if not found.
          CHANGES="$(awk -v tag="$TAG" '
            $0 ~ "^## \\[" tag "\\]" {grab=1; next}
            grab && /^## \[/ {exit}
            grab {print}
          ' CHANGELOG.md)"

          {
            echo "## ArcSign ${TAG}"
            echo
            if [ -n "$CHANGES" ]; then
              echo "### What's Changed"
              echo "$CHANGES"
            else
              echo "_No CHANGELOG entry found for ${TAG}; see commit history._"
              echo
            fi
            echo "### Downloads"
            echo
            echo "| Platform | File |"
            echo "|----------|------|"
            echo "| macOS (Apple Silicon) | \`ArcSign-macOS-ARM64.dmg\` |"
            echo "| Windows (x64) | \`ArcSign-Windows-x64.msi\` |"
            echo "| Linux (x64) | \`ArcSign-Linux-x64.deb\`, \`.AppImage\` |"
            echo
            echo "### Verification"
            echo "\`SHA256SUMS\` covers both the installer bundles and the Go"
            echo "shared library (\`libarcsign.dylib\` / \`.so\` / \`.dll\`). See"
            echo "[\`docs/reproducible-builds.md\`](https://github.com/arcsignio/arcsign/blob/master/docs/reproducible-builds.md)"
            echo "for how to rebuild from source and verify the hash matches."
            echo
            echo "### Install (macOS / Linux)"
            echo '```bash'
            echo "bash <(curl -fsSL https://arcsign.io/install.sh)"
            echo '```'
          } > "$NOTES_FILE"

          echo "=== release notes ==="
          cat "$NOTES_FILE"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          tag_name: ${{ github.ref_name }}
          name: ArcSign ${{ github.ref_name }}
          body_path: release-notes.md
          files: |
            release-assets/*
          draft: false
          prerelease: false

      # NOTE: Cloudflare R2 upload removed. GitHub Release is now the
      # sole distribution channel — binaries, SHA256SUMS, latest.json.
      # arcsign.io install.sh + Tauri updater both point to
      # github.com/arcsignio/arcsign/releases/...

  # NOTE: deploy-landing-page job 已移除。
  #
  # Landing page (arcsign.io) 由 Cloudflare Pages 從個人 repo
  # the maintainer's personal repo master 自動 build。release.yml 跑在公開
  # repo arcsignio/arcsign，不負責 marketing site。
  #
  # 個人 repo 那邊也已切換到 GitHub Release：
  # - 下載按鈕用 releases/latest/download/<asset>（永遠指向最新）
  # - install.sh / install.ps1 用 GitHub Release API 動態抓 latest tag
  # 不再需要 CI 寫死版本號到 landing-page 任何檔案。
